// ── Chart Components (pure SVG, no library) ───────────────────────────────
function BarChartSVG({data,keys,colors,height=200}){
  const max=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)),1);
  const bw=Math.floor(320/data.length/keys.length)-2;
  const gw=Math.floor(320/data.length);
  return(
    <svg width="100%" viewBox={`0 0 360 ${height+40}`} style={{overflow:"visible"}}>
      {[0,0.25,0.5,0.75,1].map((t,i)=>(
        <g key={i}>
          <line x1="30" y1={height-(t*height)+5} x2="350" y2={height-(t*height)+5} stroke="#f1f5f9" strokeWidth="1"/>
          <text x="25" y={height-(t*height)+9} fontSize="8" fill="#94a3b8" textAnchor="end">{Math.round(t*max)}</text>
        </g>
      ))}
      {data.map((d,di)=>(
        <g key={di} transform={`translate(${30+di*gw},0)`}>
          {keys.map((k,ki)=>{
            const val=d[k]||0,h=Math.max((val/max)*height,1);
            return <g key={ki}>
              <rect x={ki*(bw+2)} y={height-h+5} width={bw} height={h} fill={colors[ki]} rx="2"
                onMouseEnter={e=>{e.target.setAttribute("opacity","0.8");}} onMouseLeave={e=>{e.target.setAttribute("opacity","1");}}/>
              <title>{k}: {val}</title>
            </g>;
          })}
          <text x={gw/2-10} y={height+18} fontSize="9" fill="#94a3b8" textAnchor="middle">{d.month||d.name}</text>
        </g>
      ))}
      <g transform={`translate(30,${height+28})`}>
        {keys.map((k,i)=><g key={i} transform={`translate(${i*80},0)`}><rect x="0" y="-6" width="8" height="8" fill={colors[i]} rx="1"/><text x="11" y="1" fontSize="9" fill="#64748b">{k}</text></g>)}
      </g>
    </svg>
  );
}

function LineChartSVG({data,keys,colors,height=200}){
  const max=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)),1);
  const w=320,pts=data.length;
  const xStep=pts>1?w/(pts-1):w/2;
  return(
    <svg width="100%" viewBox={`0 0 360 ${height+40}`} style={{overflow:"visible"}}>
      {[0,0.25,0.5,0.75,1].map((t,i)=>(
        <g key={i}>
          <line x1="30" y1={height-(t*height)+5} x2="350" y2={height-(t*height)+5} stroke="#f1f5f9" strokeWidth="1"/>
          <text x="25" y={height-(t*height)+9} fontSize="8" fill="#94a3b8" textAnchor="end">{Math.round(t*max)}</text>
        </g>
      ))}
      {data.map((d,di)=>(
        <text key={di} x={30+di*xStep} y={height+18} fontSize="9" fill="#94a3b8" textAnchor="middle">{d.month}</text>
      ))}
      {keys.map((k,ki)=>{
        const points=data.map((d,di)=>`${30+di*xStep},${height-(((d[k]||0)/max)*height)+5}`).join(" ");
        return <g key={ki}>
          <polyline points={points} fill="none" stroke={colors[ki]} strokeWidth="2.5" strokeLinejoin="round"/>
          {data.map((d,di)=><circle key={di} cx={30+di*xStep} cy={height-(((d[k]||0)/max)*height)+5} r="4" fill={colors[ki]}><title>{k}: {d[k]||0}</title></circle>)}
        </g>;
      })}
      <g transform={`translate(30,${height+28})`}>
        {keys.map((k,i)=><g key={i} transform={`translate(${i*90},0)`}><line x1="0" y1="-3" x2="10" y2="-3" stroke={colors[i]} strokeWidth="2"/><text x="13" y="1" fontSize="9" fill="#64748b">{k}</text></g>)}
      </g>
    </svg>
  );
}

function DonutChart({data,colors,size=140}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let angle=-90;
  const cx=size/2,cy=size/2,r=size*0.35,ir=size*0.22;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*360;
    const startA=angle*(Math.PI/180);
    angle+=sweep;
    const endA=angle*(Math.PI/180);
    const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
    const x2=cx+r*Math.cos(endA),y2=cy+r*Math.sin(endA);
    const xi1=cx+ir*Math.cos(startA),yi1=cy+ir*Math.sin(startA);
    const xi2=cx+ir*Math.cos(endA),yi2=cy+ir*Math.sin(endA);
    const lg=sweep>180?1:0;
    return{...d,path:`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ir} ${ir} 0 ${lg} 0 ${xi1} ${yi1} Z`,color:colors[i]||"#94a3b8"};
  });
  return(
    <svg width={size} height={size} style={{display:"block",margin:"0 auto"}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity="0.9"><title>{s.name}: {s.value}</title></path>)}
      <text x={cx} y={cy+4} textAnchor="middle" fontSize="11" fontWeight="700" fill="#1e293b">{data.length}</text>
      <text x={cx} y={cy+14} textAnchor="middle" fontSize="8" fill="#94a3b8">sources</text>
    </svg>
  );
}

function HBarChart({data,height=180}){
  const max=Math.max(...data.map(d=>(d.Goodness||0)+(d.Leakage||0)+(d.Avoidance||0)),1);
  const bh=16,gap=8,total=data.length;
  return(
    <svg width="100%" viewBox={`0 0 300 ${total*(bh+gap)+10}`}>
      {data.map((d,i)=>{
        const gw=((d.Goodness||0)/max)*220,lw=((d.Leakage||0)/max)*220,aw=((d.Avoidance||0)/max)*220;
        const y=i*(bh+gap);
        return <g key={i}>
          <text x="55" y={y+bh-3} fontSize="10" fill="#64748b" textAnchor="end">{d.name}</text>
          <rect x="58" y={y} width={Math.max(gw,1)} height={bh/3} fill="#10b981" rx="2"/>
          <rect x="58" y={y+bh/3} width={Math.max(lw,1)} height={bh/3} fill="#ef4444" rx="2"/>
          <rect x="58" y={y+bh*2/3} width={Math.max(aw,1)} height={bh/3} fill="#7c3aed" rx="2"/>
          <text x={60+Math.max(gw,lw,aw)} y={y+bh-3} fontSize="9" fill="#94a3b8">{(d.Goodness||0)+(d.Leakage||0)+(d.Avoidance||0)}</text>
        </g>;
      })}
      <g transform={`translate(58,${total*(bh+gap)+2})`}>
        {[["Goodness","#10b981"],["Leakage","#ef4444"],["Avoidance","#7c3aed"]].map(([l,c],i)=>(
          <g key={i} transform={`translate(${i*72},0)`}><rect x="0" y="-5" width="7" height="7" fill={c} rx="1"/><text x="9" y="1" fontSize="8" fill="#64748b">{l}</text></g>
        ))}
      </g>
    </svg>
  );
}

function exportCSV(data,fname){
  if(!data?.length){alert("No data.");return;}
  const keys=Object.keys(data[0]).filter(k=>k!=="signoffItems"&&k!=="created_at");
  const rows=[keys.join(","),...data.map(r=>keys.map(k=>`"${String(r[k]||"").replace(/"/g,'""')}"`).join(","))];
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));a.download=fname;a.click();
}

  async function save(){
    if(!form.title?.trim())return;
    setSaving(true);
    const tbl=tab==="goodness"?"goodness":tab==="leakage"?"leakage":"avoidance";
    const row=editId?{...form,id:editId}:{...form,id:Date.now().toString()};
    try{
      if(editId){await dbUpdate(tbl,editId,row);if(tab==="goodness")setG(g=>g.map(i=>i.id===editId?row:i));else if(tab==="leakage")setL(g=>g.map(i=>i.id===editId?row:i));else setA(g=>g.map(i=>i.id===editId?row:i));}
      else{await dbInsert(tbl,row);if(tab==="goodness")setG(g=>[row,...g]);else if(tab==="leakage")setL(g=>[row,...g]);else setA(g=>[row,...g]);}
      setShowForm(false);showToast(editId?"Updated!":"Added!");
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  }

    if(!window.confirm("Delete?"))return;
    try{await dbDelete(tbl,id);if(tbl==="goodness")setG(g=>g.filter(i=>i.id!==id));else if(tbl==="leakage")setL(g=>g.filter(i=>i.id!==id));else setA(g=>g.filter(i=>i.id!==id));showToast("Deleted.");}

                      <td style={S.td}>{item.owner}</td>
                      <td style={S.td}><Bdg m={G_META[item.status]}><Dot m={G_META[item.status]}/>{item.status}</Bdg></td>
                      <td style={S.td}><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{(item.signoffItems||[]).map((s,i)=><span key={i} style={{fontSize:9,padding:"2px 6px",borderRadius:10,background:s.signedOffBy&&s.signedOffDate?"#d1fae5":"#f3f4f6",color:s.signedOffBy&&s.signedOffDate?"#065f46":"#9ca3af",fontWeight:600}}>{s.signedOffBy&&s.signedOffDate?"✓ ":""}{s.stakeholder}</span>)}</div></td>
                      <td style={{...S.td,color:"#10b981",fontWeight:600}}>{item.impactMillions?`₹${item.impactMillions}Mn`:"—"}</td>
                      <td style={S.td} onClick={e=>e.stopPropagation()}>{canEdit&&<div style={{display:"flex",gap:6}}><button onClick={()=>openEdit(item)} style={{background:"none",border:"none",color:"#e11d74",cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>{isAdmin&&<button onClick={()=>remove(item.id,"goodness")} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Del</button>}</div>}</td>
                    </tr>
                    {expId===item.id&&<tr><td colSpan={9} style={{padding:"10px 16px",background:"#fdf2f8",borderBottom:"1px solid #fce7f3",fontSize:11,color:"#64748b"}}><strong style={{color:"#e11d74"}}>Remarks:</strong> {item.remarks||"None"} &nbsp;·&nbsp; {(item.signoffItems||[]).map((s,i)=><span key={i} style={{marginRight:10}}><strong>{s.stakeholder}:</strong> {s.signedOffBy||"—"} {s.signedOffDate?`(${fmtD(s.signedOffDate)})`:"(pending)"}</span>)}</td></tr>}
                  </React.Fragment>
                ))}
                {fG.length===0&&<tr><td colSpan={9} style={{padding:40,textAlign:"center",color:"#94a3b8"}}>No items yet. Click "+ Add"!</td></tr>}
              </tbody></table>
            </div>
          </div>
        )}

        {/* LEAKAGE */}
        {!loading&&tab==="leakage"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
              {[
                {label:"Total Items",value:fL.length,color:"#ef4444",sub:`all leakage items`},
                {label:"Total Leakage",value:`₹${fL.reduce((s,i)=>s+(parseFloat(i.leakageMillions)||0),0).toFixed(1)}Mn`,color:"#f97316",sub:"identified"},
                {label:"Total Recovered",value:`₹${fL.reduce((s,i)=>s+(parseFloat(i.recoveredMillions)||0),0).toFixed(1)}Mn`,color:"#10b981",sub:"recovered so far"},
                {label:"Outstanding",value:`₹${(fL.reduce((s,i)=>s+(parseFloat(i.leakageMillions)||0),0)-fL.reduce((s,i)=>s+(parseFloat(i.recoveredMillions)||0),0)).toFixed(1)}Mn`,color:"#7c3aed",sub:"yet to recover"},
              ].map(s=>(
                <div key={s.label} style={{...S.card,padding:"16px 18px",borderTop:`3px solid ${s.color}`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:-20,right:-20,width:70,height:70,borderRadius:"50%",background:s.color,opacity:0.1,filter:"blur(16px)"}}/>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{s.label}</div>
                  <div style={{fontSize:24,fontWeight:800,color:s.color,marginBottom:2}}>{s.value}</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>{s.sub}</div>
                </div>
              ))}
            </div>
            <div style={S.card}>
              <table><thead><tr>{["Item","Date","Period","Owner","Leakage","Recovered","Rec %","Resolution","Invoice","Signed Off By",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {fL.map(item=>(
                  <React.Fragment key={item.id}>
                    <tr style={{background:hovId===item.id?"#fafafa":"#fff",cursor:"pointer"}} onMouseEnter={()=>setHovId(item.id)} onMouseLeave={()=>setHovId(null)} onClick={()=>setExpId(expId===item.id?null:item.id)}>
                      <td style={{...S.td,fontWeight:600,color:"#1e293b",maxWidth:180}}>{item.title}{item.category&&<div style={{fontSize:10,color:"#94a3b8"}}>{item.category}</div>}</td>
                      <td style={{...S.td,fontSize:11,whiteSpace:"nowrap"}}>{fmtD(item.date)}</td>
                      <td style={{...S.td,fontSize:11,whiteSpace:"nowrap"}}>{item.month} {item.year}</td>
                      <td style={S.td}>{item.owner}</td>
                      <td style={{...S.td,color:"#ef4444",fontWeight:700}}>₹{item.leakageMillions||"0"}Mn</td>
                      <td style={{...S.td,color:"#10b981",fontWeight:700}}>₹{item.recoveredMillions||"0"}Mn</td>
                      <td style={S.td}><div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:36,background:"#f1f5f9",borderRadius:4,height:5}}><div style={{width:`${recPct(item)}%`,background:"linear-gradient(90deg,#10b981,#059669)",borderRadius:4,height:5}}/></div><span style={{fontSize:10,color:"#94a3b8"}}>{recPct(item)}%</span></div></td>
                      <td style={{...S.td,fontSize:11,whiteSpace:"nowrap",color:item.expectedResolutionDate&&new Date(item.expectedResolutionDate)<new Date()&&item.status!=="Fully Recovered"?"#ef4444":"#475569"}}>{fmtD(item.expectedResolutionDate)}</td>
                      <td style={{...S.td,fontSize:11}}>{item.invoiceRef||"—"}</td>
                      <td style={S.td}><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{(item.signoffItems||[]).map((s,i)=><span key={i} style={{fontSize:9,padding:"2px 6px",borderRadius:10,background:s.signedOffBy&&s.signedOffDate?"#d1fae5":"#f3f4f6",color:s.signedOffBy&&s.signedOffDate?"#065f46":"#9ca3af",fontWeight:600}}>{s.signedOffBy&&s.signedOffDate?"✓ ":""}{s.stakeholder}</span>)}</div></td>
                      <td style={S.td} onClick={e=>e.stopPropagation()}>{canEdit&&<div style={{display:"flex",gap:6}}><button onClick={()=>openEdit(item)} style={{background:"none",border:"none",color:"#e11d74",cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>{isAdmin&&<button onClick={()=>remove(item.id,"leakage")} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Del</button>}</div>}</td>
                    </tr>
                    {expId===item.id&&<tr><td colSpan={11} style={{padding:"10px 16px",background:"#fff5f5",borderBottom:"1px solid #fee2e2",fontSize:11,color:"#64748b"}}><strong style={{color:"#ef4444"}}>Remarks:</strong> {item.remarks||"None"}</td></tr>}
                  </React.Fragment>
                ))}
                {fL.length===0&&<tr><td colSpan={11} style={{padding:40,textAlign:"center",color:"#94a3b8"}}>No leakages yet. Click "+ Add"!</td></tr>}
              </tbody></table>
            </div>
          </div>
        )}

        {/* AVOIDANCE */}
        {!loading&&tab==="avoidance"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
              {[
                {label:"Total Items",value:fA.length,color:"#7c3aed",sub:"all avoidance items"},
                {label:"Total Avoided",value:`₹${fA.reduce((s,i)=>s+(parseFloat(i.avoidanceMillions)||0),0).toFixed(1)}Mn`,color:"#10b981",sub:"impact prevented"},
                {label:"Control Execution",value:fA.filter(i=>i.source==="Control Execution").length,color:"#065f46",sub:`₹${fA.filter(i=>i.source==="Control Execution").reduce((s,i)=>s+(parseFloat(i.avoidanceMillions)||0),0).toFixed(1)}Mn`},
                {label:"Investigations",value:fA.filter(i=>i.source==="Investigation Finding").length,color:"#1d4ed8",sub:`₹${fA.filter(i=>i.source==="Investigation Finding").reduce((s,i)=>s+(parseFloat(i.avoidanceMillions)||0),0).toFixed(1)}Mn`},
              ].map(s=>(
                <div key={s.label} style={{...S.card,padding:"16px 18px",borderTop:`3px solid ${s.color}`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:-20,right:-20,width:70,height:70,borderRadius:"50%",background:s.color,opacity:0.1,filter:"blur(16px)"}}/>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{s.label}</div>
                  <div style={{fontSize:24,fontWeight:800,color:s.color,marginBottom:2}}>{s.value}</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>{s.sub}</div>
                </div>
              ))}
            </div>
            <div style={S.card}>
              <table><thead><tr>{["Initiative","Source","Category","Date","Period","Owner","Avoidance (Mn)","Control / Method","Signed Off By",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {fA.map(item=>(
                  <tr key={item.id} style={{background:hovId===item.id?"#fafafa":"#fff"}} onMouseEnter={()=>setHovId(item.id)} onMouseLeave={()=>setHovId(null)}>
                    <td style={{...S.td,fontWeight:600,color:"#1e293b",maxWidth:180}}>{item.title}</td>
                    <td style={S.td}><Bdg m={AV_META[item.source]}>{item.source}</Bdg></td>
                    <td style={{...S.td,fontSize:11,whiteSpace:"nowrap"}}>{fmtD(item.date)}</td>
                    <td style={{...S.td,fontSize:11,whiteSpace:"nowrap"}}>{item.month} {item.year}</td>
                    <td style={S.td}>{item.owner}</td>
                    <td style={{...S.td,color:"#7c3aed",fontWeight:700}}>₹{item.avoidanceMillions||"0"}Mn</td>
                    <td style={{...S.td,fontSize:11,maxWidth:140,color:"#64748b"}}>{item.control||"—"}</td>
                    <td style={{...S.td,fontSize:11,maxWidth:160,color:"#94a3b8"}}>{item.remarks||"—"}</td>
                    <td style={S.td} onClick={e=>e.stopPropagation()}>{canEdit&&<div style={{display:"flex",gap:6}}><button onClick={()=>openEdit(item)} style={{background:"none",border:"none",color:"#e11d74",cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>{isAdmin&&<button onClick={()=>remove(item.id,"avoidance")} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:11}}>Del</button>}</div>}</td>
                  </tr>
                ))}
                {fA.length===0&&<tr><td colSpan={9} style={{padding:40,textAlign:"center",color:"#94a3b8"}}>No avoidance items yet. Click "+ Add"!</td></tr>}
              </tbody></table>
            </div>
          </div>
        )}
      </div>

      {/* MODAL */}
      {showForm&&(
        <div style={S.overlay}>
          <div style={S.modal}>
            <div style={{fontSize:16,fontWeight:800,color:"#1e293b",marginBottom:18}}>{editId?"Edit":"Add"} {tab==="goodness"?"Goodness":tab==="leakage"?"Leakage":"Avoidance"} Item</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><label style={S.lbl}>Title *</label><input value={form.title||""} onChange={e=>ff("title",e.target.value)} placeholder="Title" style={S.inp}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                <div><label style={S.lbl}>Date</label><input type="date" value={form.date||""} onChange={e=>ff("date",e.target.value)} style={S.inp}/></div>
                <div><label style={S.lbl}>Month</label><select value={form.month||""} onChange={e=>ff("month",e.target.value)} style={S.inp}>{MONTHS.map(m=><option key={m}>{m}</option>)}</select></div>
                <div><label style={S.lbl}>Year</label><select value={form.year||""} onChange={e=>ff("year",e.target.value)} style={S.inp}>{YEARS.map(y=><option key={y}>{y}</option>)}</select></div>
              </div>
              {/* Common fields for all 3 tabs */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label style={S.lbl}>Owner</label><select value={form.owner||""} onChange={e=>ff("owner",e.target.value)} style={S.inp}>{MEMBERS.map(m=><option key={m}>{m}</option>)}</select></div>
                <div><label style={S.lbl}>Category</label><select value={form.category||""} onChange={e=>ff("category",e.target.value)} style={S.inp}>{GOODNESS_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
                <div><label style={S.lbl}>Source</label><select value={form.source||""} onChange={e=>ff("source",e.target.value)} style={S.inp}>{AVOIDANCE_SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
              </div>
              {/* Tab-specific fields */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {tab==="goodness"&&<>
                  <div><label style={S.lbl}>Frequency</label><select value={form.frequency||""} onChange={e=>ff("frequency",e.target.value)} style={S.inp}><option>Monthly</option><option>Quarterly</option></select></div>
                  <div><label style={S.lbl}>Status</label><select value={form.status||""} onChange={e=>ff("status",e.target.value)} style={S.inp}>{GOODNESS_STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
                  <div><label style={S.lbl}>Impact (₹ Mn)</label><input placeholder="e.g. 45" value={form.impactMillions||""} onChange={e=>ff("impactMillions",e.target.value)} style={S.inp}/></div>
                </>}
                {tab==="leakage"&&<>
                  <div><label style={S.lbl}>Leakage (₹ Mn)</label><input placeholder="e.g. 62" value={form.leakageMillions||""} onChange={e=>ff("leakageMillions",e.target.value)} style={S.inp}/></div>
                  <div><label style={S.lbl}>Recovered (₹ Mn)</label><input placeholder="e.g. 10" value={form.recoveredMillions||""} onChange={e=>ff("recoveredMillions",e.target.value)} style={S.inp}/></div>
                  <div><label style={S.lbl}>Expected Resolution</label><input type="date" value={form.expectedResolutionDate||""} onChange={e=>ff("expectedResolutionDate",e.target.value)} style={S.inp}/></div>
                  <div><label style={S.lbl}>Invoice Ref</label><input placeholder="INV-2026-001" value={form.invoiceRef||""} onChange={e=>ff("invoiceRef",e.target.value)} style={S.inp}/></div>
                </>}
                {tab==="avoidance"&&<>
                  <div><label style={S.lbl}>Avoidance (₹ Mn)</label><input placeholder="e.g. 85" value={form.avoidanceMillions||""} onChange={e=>ff("avoidanceMillions",e.target.value)} style={S.inp}/></div>
                  <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Control / Method</label><input placeholder="e.g. AI fraud detection" value={form.control||""} onChange={e=>ff("control",e.target.value)} style={S.inp}/></div>
                </>}
              </div>
              {/* Sign-off — common for all 3 tabs */}
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <label style={S.lbl}>Sign-off By</label>
                  <button type="button" onClick={addSR} style={{background:"#fce7f3",border:"none",color:"#e11d74",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer"}}>+ Add Row</button>
                </div>
                {(form.signoffItems||[]).map((row,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:8,marginBottom:7}}>
                    <select value={row.stakeholder} onChange={e=>updSR(i,"stakeholder",e.target.value)} style={{...S.inp,padding:"8px 10px"}}>{STAKEHOLDERS.map(s=><option key={s}>{s}</option>)}</select>
                    <input placeholder="Name" value={row.signedOffBy} onChange={e=>updSR(i,"signedOffBy",e.target.value)} style={{...S.inp,padding:"8px 10px"}}/>
                    <input type="date" value={row.signedOffDate} onChange={e=>updSR(i,"signedOffDate",e.target.value)} style={{...S.inp,padding:"8px 10px"}}/>
                    <button type="button" onClick={()=>remSR(i)} style={{background:"#fee2e2",border:"none",color:"#ef4444",width:30,height:34,borderRadius:8,cursor:"pointer"}}>✕</button>
                  </div>
                ))}
                {(form.signoffItems||[]).length===0&&<div style={{fontSize:11,color:"#94a3b8"}}>No sign-offs added. Click "+ Add Row".</div>}
              </div>
              <div><label style={S.lbl}>Remarks</label><textarea placeholder="Notes..." rows={2} value={form.remarks||""} onChange={e=>ff("remarks",e.target.value)} style={{...S.inp,resize:"none"}}/></div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={save} disabled={saving} style={{flex:1,background:"linear-gradient(135deg,#e11d74,#9333ea)",border:"none",color:"#fff",padding:"11px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",opacity:saving?0.7:1}}>{saving?"Saving...":"Save"}</button>
              <button onClick={()=>setShowForm(false)} style={{flex:1,background:"transparent",border:"1px solid #e2e8f0",color:"#94a3b8",padding:"11px",borderRadius:10,fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
